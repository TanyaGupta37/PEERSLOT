<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>PeerSlot Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body>

  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>PeerSlot</h2>
      <a class="active" href="dashboard.html">Dashboard</a>
      <a href="offer-help.html">Offer Help</a>
      <a href="get-help.html">Get Help</a>
      <a href="#sessions">My Sessions</a>
      <a href="#rewards">Rewards</a>
    </div>


    <!-- MAIN -->
    <div class="dashboard-main">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="search-box">
          <i data-lucide="search" class="search-icon"></i>
          <input placeholder="Search subjects, peers, skills...">
        </div>

        <div class="top-icons">
          <div class="bell"><i data-lucide="bell"></i></div>

          <div class="avatar-wrapper">
            <div class="avatar" id="avatar">T</div>

            <div class="avatar-dropdown" id="avatarDropdown">
              <div class="avatar-dropdown-item" data-action="profile"><i data-lucide="user"></i> My Profile</div>
              <div class="avatar-dropdown-item" data-action="settings"><i data-lucide="settings"></i> Settings</div>
              <div class="avatar-dropdown-item" data-action="logout"><i data-lucide="log-out"></i> Log out</div>
            </div>
          </div>
        </div>
      </div>

      <!-- WELCOME -->
      <div class="welcome">
        <h1 id="welcome">
          Welcome back, <span id="firstName"></span> <i data-lucide="hand"></i>
        </h1>

        <div class="stats">
          <div class="stat">
            <i data-lucide="star"></i> 4.8 / 5
          </div>

          <div class="stat">
            <i data-lucide="users"></i> Peers helped: 12
          </div>

          <div class="stat">
            <i data-lucide="calendar"></i> Sessions booked: 7
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div class="dashboard-grid">

        <!-- LEFT COLUMN -->
        <div>

          <!-- CALENDAR -->
          <div class="card">
            <h3>My Calendar</h3>
            <div id="calendar"></div>
          </div>

          <!-- UPCOMING SESSIONS -->
          <div class="card" id="sessions">
            <h3>Upcoming Sessions</h3>

            <div class="session">
              <strong>DSA with Rohan</strong><br>
              Today · 6:00 PM · Confirmed
            </div>

            <div class="session">
              <strong>Python with Ananya</strong><br>
              Tomorrow · 8:00 PM · Pending
            </div>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div>

          <!-- CHAT -->
          <div class="card">
            <h3>Chat</h3>

            <div class="chat-container">

              <div class="chat-sidebar">
                <input id="chatSearch" placeholder="Search chats...">
                <div id="chat-list"></div>
              </div>

              <div class="chat-box">
                <div id="chat-header"></div>
                <div id="messages"></div>

                <div class="chat-input">
                  <input id="chatInput" placeholder="Type a message...">
                  <button onclick="sendMessage()">Send</button>
                </div>
              </div>

            </div>
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Dashboard logic -->
  <script type="module" src="dashboard.js"></script>

  <!-- Calendar UI -->
  <script src="dashboard-calendar.js"></script>

  <!-- Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>

</body>

</html>
