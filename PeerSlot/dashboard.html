<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>PeerSlot Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body>

  <div class="dashboard-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>PeerSlot</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="offer-help.html">Offer Help</a>
      <a href="get-help.html">Get Help</a>
      <a class="active" href="sessions.html">My Sessions</a>
      <a href="rewards.html">Rewards</a>
    </div>


    <!-- MAIN -->
    <div class="dashboard-main">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="search-box">
          <i data-lucide="search" class="search-icon"></i>
          <input placeholder="Search subjects, peers, skills...">
        </div>

        <div class="top-icons">
          <div class="bell"><i data-lucide="bell"></i></div>

          <div class="avatar-wrapper">
            <div class="avatar" id="avatar">T</div>

            <div class="avatar-dropdown" id="avatarDropdown">
              <div class="avatar-dropdown-item" data-action="profile"><i data-lucide="user"></i> My Profile</div>
              <div class="avatar-dropdown-item" data-action="settings"><i data-lucide="settings"></i> Settings</div>
              <div class="avatar-dropdown-item" data-action="logout"><i data-lucide="log-out"></i> Log out</div>
            </div>
          </div>
        </div>
      </div>

      <!-- WELCOME -->
      <div class="welcome">
        <h1 id="welcome">
          Welcome back, <span id="firstName"></span> <i data-lucide="hand"></i>
        </h1>

        <div class="stats">
          <div class="stat">
            <i data-lucide="star"></i>
            <span id="userRating">0.0 / 5</span>
          </div>

          <div class="stat">
            <i data-lucide="users"></i>
            <span id="userHelped">Peers helped: 0</span>
          </div>

          <div class="stat">
            <i data-lucide="calendar"></i>
            <span id="sessionsBooked">Sessions booked: 0</span>
          </div>
        </div>
      </div>

      <!-- GRID -->
      <div class="dashboard-grid">

        <!-- LEFT COLUMN -->
        <div>

          <!-- CALENDAR -->
          <div class="card">
            <h3>Calendar View</h3>
            <div id="calendar"></div>
          </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div>

          <!-- CHAT -->
          <div class="card">
            <h3>Chat</h3>

            <div class="chat-container">

              <div class="chat-sidebar">
                <input id="chatSearch" placeholder="Search chats...">
                <div id="chat-list"></div>
              </div>

              <div class="chat-box">
                <div id="chat-header"></div>
                <div id="messages"></div>

                <div class="chat-input">
                  <input id="chatInput" placeholder="Type a message...">
                  <button onclick="sendMessage()">Send</button>
                </div>
              </div>

              <div id="rating-modal-overlay" class="modal-overlay" style="display: none;">
                <div class="modal-card rating-modal">
                  <div class="modal-header">
                    <div>
                      <h3>Rate your helper</h3>
                      <p id="rating-modal-text" class="modal-subtitle">Select 1 to 5 stars</p>
                    </div>
                    <button id="rating-modal-close" class="close-btn" aria-label="Close rating dialog">×</button>
                  </div>
                  <div class="modal-body">
                    <div id="rating-stars" class="rating-stars">
                      <button type="button" class="star-btn" data-value="1" aria-label="1 star">★</button>
                      <button type="button" class="star-btn" data-value="2" aria-label="2 stars">★</button>
                      <button type="button" class="star-btn" data-value="3" aria-label="3 stars">★</button>
                      <button type="button" class="star-btn" data-value="4" aria-label="4 stars">★</button>
                      <button type="button" class="star-btn" data-value="5" aria-label="5 stars">★</button>
                    </div>
                    <div id="rating-feedback" class="rating-feedback">Click a star to set your rating.</div>
                  </div>
                  <div class="modal-actions">
                    <button id="rating-submit" class="btn-primary">Submit rating</button>
                    <button id="rating-cancel" class="btn-secondary">Cancel</button>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Dashboard logic -->
  <script type="module" src="dashboard.js"></script>

  <!-- Calendar UI -->
  <script src="dashboard-calendar.js"></script>

  <!-- Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>

</body>

</html>
