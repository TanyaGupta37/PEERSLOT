<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – PeerSlot</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* Profile Page Specific Styles */
    .profile-layout {
      display: flex;
      min-height: 100vh;
      background: #f4f6fb;
      color: #0f172a;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #0b1c3d, #0f2a5c);
      color: white;
      padding: 20px;
      flex-shrink: 0;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 24px;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      margin-bottom: 8px;
      opacity: 0.9;
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.15);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      background: #f4f6fb;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #64748b;
    }

    .breadcrumb a {
      color: #64748b;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: #2563eb;
    }

    .breadcrumb .current {
      color: #0f172a;
      font-weight: 500;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .notification-icon i {
      width: 20px;
      height: 20px;
      color: #64748b;
    }

    .avatar-wrapper {
      position: relative;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .avatar-dropdown {
      position: absolute;
      top: 50px;
      right: 0;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      padding: 8px 0;
      min-width: 160px;
      display: none;
      z-index: 100;
    }

    .avatar-dropdown.show {
      display: block;
    }

    .avatar-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      color: #0f172a;
      transition: background 0.2s;
    }

    .avatar-dropdown-item:hover {
      background: #f1f5f9;
    }

    .avatar-dropdown-item i {
      width: 18px;
      height: 18px;
      color: #64748b;
    }

    /* Profile Content */
    .profile-content {
      flex: 1;
      padding: 0 32px 32px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #0f172a;
    }

    .profile-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* Profile Sidebar Card */
    .profile-sidebar-card {
      width: 280px;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      flex-shrink: 0;
    }

    .profile-sidebar-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .profile-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      font-size: 32px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .profile-role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #64748b;
    }

    .profile-role-badge i {
      width: 14px;
      height: 14px;
    }

    .profile-info-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .profile-info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f8fafc;
      border-radius: 10px;
      font-size: 13px;
      color: #475569;
    }

    .profile-info-item i {
      width: 16px;
      height: 16px;
      color: #64748b;
    }

    .profile-info-item.locked {
      background: #f1f5f9;
    }

    .profile-info-item .label {
      font-weight: 500;
      color: #0f172a;
    }

    /* Profile Form Card */
    .profile-form-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .form-section-title {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-label .required {
      color: #dc2626;
    }

    .form-label .locked-icon {
      color: #94a3b8;
      margin-left: 4px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      color: #0f172a;
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input:read-only,
    .form-select:disabled {
      background: #f8fafc;
      color: #64748b;
      cursor: not-allowed;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
      font-family: inherit;
    }

    .form-hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    /* Subjects/Skills */
    .subjects-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .subject-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .subject-tag button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #4338ca;
    }

    .subject-tag button:hover {
      color: #dc2626;
    }

    .icon-sm {
      width: 14px;
      height: 14px;
    }

    /* Form Actions */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    /* Messages */
    .message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .profile-container {
        flex-direction: column;
      }

      .profile-sidebar-card {
        width: 100%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

<div class="profile-layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <h2>PeerSlot</h2>
    <a href="dashboard.html">
      <i data-lucide="layout-dashboard"></i> Dashboard
    </a>
    <a href="offer-help.html">Offer Help</a>
    <a href="get-help.html">Get Help</a>
    <a href="#sessions">My Sessions</a>
    <a href="#rewards">Rewards</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="breadcrumb">
        <a href="dashboard.html">Dashboard</a>
        <i data-lucide="chevron-right" style="width:16px;height:16px;"></i>
        <span class="current">My Profile</span>
      </div>

      <div class="topbar-right">
        <div class="notification-icon">
          <i data-lucide="bell"></i>
        </div>
        <div class="avatar-wrapper">
          <div class="avatar" id="avatar"></div>
          <div class="avatar-dropdown" id="avatarDropdown">
            <div class="avatar-dropdown-item" data-action="profile">
              <i data-lucide="user"></i> My Profile
            </div>
            <div class="avatar-dropdown-item" data-action="settings">
              <i data-lucide="settings"></i> Settings
            </div>
            <div class="avatar-dropdown-item" data-action="logout">
              <i data-lucide="log-out"></i> Log out
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PROFILE CONTENT -->
    <div class="profile-content">

      <h1 class="page-title">My Profile</h1>

      <div class="profile-container">

        <!-- PROFILE SIDEBAR CARD -->
        <div class="profile-sidebar-card">
          <div class="profile-sidebar-header">
            <div class="profile-avatar-large" id="sidebarAvatar"></div>
            <div class="profile-name" id="sidebarName"></div>
            <div class="profile-role-badge">
              <i data-lucide="graduation-cap"></i> MUJ Student
            </div>
          </div>

          <div class="profile-info-list">
            <div class="profile-info-item locked">
              <i data-lucide="mail"></i>
              <span id="sidebarEmail"></span>
            </div>
            <div class="profile-info-item locked">
              <i data-lucide="user"></i>
              <span class="label">Student</span>
            </div>
          </div>
        </div>

        <!-- PROFILE FORM CARD -->
        <div class="profile-form-card">

          <div class="form-section-title">Edit Your Profile</div>

          <div id="successMessage" class="message success"></div>
          <div id="errorMessage" class="message error"></div>

          <div class="form-grid">
            <!-- Full Name (Locked) -->
            <div class="form-group">
              <label class="form-label">
                Full Name <span class="required">*</span>
                <i data-lucide="lock" class="locked-icon" style="width:14px;height:14px;"></i>
              </label>
              <input type="text" id="fullName" class="form-input" readonly placeholder="Your full name">
              <span class="form-hint">This field cannot be edited</span>
            </div>

            <!-- Role (Locked) -->
            <div class="form-group">
              <label class="form-label">
                Role
                <i data-lucide="lock" class="locked-icon" style="width:14px;height:14px;"></i>
              </label>
              <input type="text" id="role" class="form-input" readonly value="Student">
              <span class="form-hint">This field cannot be edited</span>
            </div>

            <!-- Course / Branch (Editable) -->
            <div class="form-group">
              <label class="form-label">
                Course / Branch <span class="required">*</span>
              </label>
              <input type="text" id="courseBranch" class="form-input" placeholder="e.g. B.Tech Computer Science">
            </div>

            <!-- Semester (Editable) -->
            <div class="form-group">
              <label class="form-label">
                Year / Semester <span class="required">*</span>
              </label>
              <select id="semester" class="form-select">
                <option value="">Select Semester</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
                <option value="3">3rd Semester</option>
                <option value="4">4th Semester</option>
                <option value="5">5th Semester</option>
                <option value="6">6th Semester</option>
                <option value="7">7th Semester</option>
                <option value="8">8th Semester</option>
              </select>
            </div>

            <!-- Bio (Editable) -->
            <div class="form-group full-width">
              <label class="form-label">Bio</label>
              <textarea id="bioTextarea" class="form-textarea" placeholder="Tell us about yourself, your skills, and how you can help peers..."></textarea>
              <span class="form-hint">Maximum 500 characters</span>
            </div>

            <!-- Subjects / Skills (Editable) -->
            <div class="form-group full-width">
              <label class="form-label" style="display:flex;align-items:center;gap:8px;">
                Subjects / Skills <span class="required">*</span>
                <span id="editSubjects" title="Edit subjects" style="cursor:pointer;font-size:15px;color:#64748b;display:inline-flex;align-items:center;" title="Edit subjects">✏️</span>
              </label>

              <div class="subjects-container" id="subjectsContainer">
                <!-- Subject tags will be rendered here -->
              </div>
              <div id="subjectEditor" style="display:none;">
                <select id="subjectSelect" class="form-select">
                  <option value="">Select a subject to add</option>
                </select>

                <input
                  type="text"
                  id="customSubject"
                  class="form-input"
                  placeholder="Add custom subject"
                  style="margin-top:10px;"
               />

                <button
                  type="button"
                  id="doneSubjects"
                  class="btn btn-primary"
                  style="margin-top:12px;background:#16a34a;"
                >
                Done
                </button>
             </div>

              <span class="form-hint">Select subjects you can help others with</span>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
            <button type="button" id="saveBtn" class="btn btn-primary">Save Changes</button>
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script type="module" src="profile.js"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
