<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Help Topics | PeerSlot</title>

  <!-- Global Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>PeerSlot</h2>
      <a href="dashboard.html">Dashboard</a>
      <a class="active">Topics</a>
      <a href="profile.html">Profile</a>
      <a href="settings.html">Settings</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="dashboard-main">

      <div class="card">
        <h3>Help Topics</h3>
        <p class="muted-text">
          Select the subjects you can help with or need help in
        </p>

        <!-- HELP OFFERED -->
        <h4>I can help with</h4>
        <div id="helpOffered" class="checkbox-group"></div>

        <!-- HELP NEEDED -->
        <h4 class="section-spacing">I need help in</h4>
        <div id="helpNeeded" class="checkbox-group"></div>

        <button id="saveTopics" class="primary-btn">
          Save Topics
        </button>
      </div>

    </main>
  </div>

  <!-- Topics Logic -->
  <script type="module" src="topics.js"></script>

  <!-- Icons Init -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
